<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evento 7 - Times Square NYE</title>
    <link rel="stylesheet" href="../css/countdown.css">
    <style>
        body {
            background-color: black;
            background-image: url('../img/starfall-night-sky-mountains-aesthetic-gif-preview-desktop-wallpaper.gif');
            /* Cambia 'ruta/a/tu/imagen.jpg' */
            background-size: cover;
            /* Cubre todo el elemento sin deformar */
            background-position: center;
            /* Centra la imagen */
            background-repeat: no-repeat;
            /* Evita que la imagen se repita */
            background-attachment: fixed;
            /* Fija la imagen al hacer scroll */
            margin: 0;
            /* Elimina márgenes por defecto del body */
            padding: 0;
            /* Elimina padding por defecto del body */
            height: 100vh;
            /* Asegura que el body ocupe el 100% del viewport */
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 2px;
            text-align: center;
        }

        #player {
            width: 100%;
            max-width: 800px;
            height: 450px;
            margin: 0 auto;
            border: none;
        }

        #playlist {
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            overflow-x: hidden;
            gap: 10px;
            padding: 1px;
            background-color: #fff;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            max-width: 800px;
            max-height: 400px;
            /* Altura máxima para permitir scroll vertical */
            margin: 0 auto;
        }

        .playlist-item {
            flex-shrink: 0;
            width: auto;
            /* Ocupa el ancho completo del contenedor */
            text-align: center;
            cursor: pointer;
            border: 2px solid transparent;
            border-radius: 5px;
            padding: 5px;
            transition: border-color 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
            /* Espacio entre imagen y texto */
        }

        .playlist-item.selected {
            border-color: #007bff;
            background-color: #e9ecef;
        }

        .playlist-item img {
            width: 120px;
            /* Ancho fijo para la imagen */
            height: 67px;
            /* Altura proporcional */
            object-fit: cover;
            border-radius: 3px;
            flex-shrink: 0;
        }

        .playlist-item p {
            margin: 0;
            font-size: 14px;
            font-weight: bold;
            flex-grow: 1;
            text-align: left;
        }

        .live-button {
            display: inline-block;
            align-items: center;
            padding: 5px 10px;
            border-radius: 5px;
            background-color: #ff3737;
            /* Color rojo para dar énfasis a "En vivo" */
            color: #ffffff;
            font-weight: bold;
        }

        .live-button2 {
            display: inline-block;
            align-items: center;
            padding: 5px 10px;
            border-radius: 5px;
            background-color: rgba(212, 175, 55, 0.25);
            /* Color rojo para dar énfasis a "En vivo" */
            color: #ffffff;
            font-weight: bold;
        }

        .live-icon {
            display: inline-block;
            width: 15px;
            height: 15px;
            border-radius: 50%;
            background-color: #ffffff;
            margin-right: 5px;
            animation: pulse 1.25s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.3);
                opacity: 0.7;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .live-text {
            font-size: 6vw;
        }

        .live-text2 {
            font-size: 5vw;
        }

        /* Responsive design */
        @media (max-width: 768px) {
            #player {
                height: 250px;
                /* Altura reducida en móviles */
                max-width: 100%;
            }

            #playlist {
                gap: 5px;
                margin: 0 auto;
                max-height: 450px;
                /* Altura reducida en móviles */
            }

            .playlist-item {
                padding: 3px;
            }

            .playlist-item img {
                width: 100px;
                height: 56px;
            }

            .playlist-item p {
                font-size: 12px;
            }
        }

        @media (max-width: 480px) {
            #player {
                height: 200px;
            }

            #playlist {
                max-height: 450px;
            }

            .playlist-item img {
                width: 95px;
                height: 100%;
            }

            .playlist-item p {
                font-size: 15px;
            }
        }
    </style>
</head>

<body>
    <h1 style="color: #fff;" hidden>Mundial 2026</h1>
    <p style="color: #fff;" hidden>Haz doble clic en un elemento de la playlist para editar su título, miniatura y URL.
    </p>
    <!-- Sección Countdown Evento -->
    <center>
        <div class="container-timer">
            <a title="Countdown 3">
                    <img src="../img/Banner-Times-Square-NYE-1000x250.png" class="background-timer" alt="countdown" />
                </a>
                <video class="timer-video-nye" autoplay loop muted>
                    <source src="../vid/tsq27.webm" type="video/webm">
                    Tu navegador no soporta la reproducción de video.
                </video>
            <div id="timer6" class="timer6">
                <span id="days6">00</span>
                <span>:</span>
                <span id="hours6">00</span>
                <span>:</span>
                <span id="minutes6">00</span>
                <span>:</span>
                <span id="seconds6">00</span>
            </div>
            <span>
                <div id="liveButton6" class="timer-button6 live-button">
                    <span class="live-icon"></span>
                    <span class="live-text">En vivo</span>
                </div>
            </span>

        </div>
    </center>
    <iframe id="player" src="" allowfullscreen></iframe>
    <!-- Sección Countdown Evento -->
    <center>
        <div class="container-timer">
            <a title="Countdown 3">
                    <img src="../img/Banner-Times-Square-NYE-1000x250.png" class="background-timer" alt="countdown" />
                </a>
                
            <div id="timer7" class="timer7">
                Cuenta regresiva
                <br>
                <span id="days7">00</span>
                <span>:</span>
                <span id="hours7">00</span>
                <span>:</span>
                <span id="minutes7">00</span>
                <span>:</span>
                <span id="seconds7">00</span>
            </div>
            <span>
                <div id="liveButton7" class="timer-button7 live-button2">
                    <span class="live-text2">🎉🎆✨🥂🍾  2️⃣0️⃣2️⃣7️⃣</span>
                </div>
            </span>

        </div>
    </center>
    <div id="playlist"></div>

    <script>
        // Array de playlist: url (URL completa del embed), title, thumbnail
        let playlist = [
            {
                url: "https://www.youtube.com/embed/yZYqzv72xHc?autoplay=1", // Shroud
                title: "Times Square NYE 2027 - Live",
                thumbnail: "https://i.ytimg.com/vi/yZYqzv72xHc/maxresdefault.jpg"
            },
            {
                url: "https://www.youtube.com/embed/TuSuW83w6e4?autoplay=1", // Shroud
                title: "NYE 2027 Live From Times Square",
                thumbnail: "../img/webcastnye.jpg"
            },
            {
                url: "https://www.youtube.com/embed/TuSuW83w6e4?autoplay=1", // Video de Dailymotion
                title: "NYE 2027 Live From Times Square (ASL)",
                thumbnail: "../img/webcastnyeasl.jpg" // Ajusta según sea necesario
            },
            {
                url: "https://www.youtube.com/embed/liNIoxYcwlY?autoplay=1", // Video de Dailymotion
                title: "Live Multi-View",
                thumbnail: "https://i.ytimg.com/vi/liNIoxYcwlY/maxresdefault.jpg" // Ajusta según sea necesario
            },
            {
                url: "../live/webcast-nye.html", // Video de Dailymotion
                title: "NYE Webcast",
                thumbnail: "https://img.gruporeforma.com/ImagenesIpad/7/98/6097854.jpg" // Ajusta según sea necesario
            },
        ];

        // Cargar playlist desde localStorage si existe
        const savedPlaylist = localStorage.getItem('playlist');
        if (savedPlaylist) {
            playlist = JSON.parse(savedPlaylist);
        }

        const player = document.getElementById('player');
        const playlistContainer = document.getElementById('playlist');
        let currentIndex = 0;

        // Función para cargar un video/transmisión
        function loadVideo(index) {
            const item = playlist[index];
            player.src = item.url;
            // Resaltar el seleccionado
            document.querySelectorAll('.playlist-item').forEach((el, i) => {
                el.classList.toggle('selected', i === index);
            });
            currentIndex = index;
        }

        // Función para editar un elemento (doble clic)
        function editItem(index) {
            const item = playlist[index];
            const newUrl = prompt("Editar URL del embed:", item.url);
            const newTitle = prompt("Editar título:", item.title);
            const newThumbnail = prompt("Editar URL de miniatura:", item.thumbnail);
            if (newUrl !== null && newTitle !== null && newThumbnail !== null) {
                playlist[index].url = newUrl;
                playlist[index].title = newTitle;
                playlist[index].thumbnail = newThumbnail;
                localStorage.setItem('playlist', JSON.stringify(playlist)); // Guardar cambios
                renderPlaylist(); // Re-renderizar la playlist
            }
        }

        // Función para renderizar la playlist
        function renderPlaylist() {
            playlistContainer.innerHTML = ''; // Limpiar
            playlist.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'playlist-item';
                if (index === currentIndex) div.classList.add('selected');
                div.innerHTML = `
                    <img src="${item.thumbnail}" alt="${item.title}">
                    <p>${item.title}</p>
                `;
                div.addEventListener('click', () => loadVideo(index));
                div.addEventListener('dblclick', () => editItem(index)); // Doble clic para editar
                playlistContainer.appendChild(div);
            });
        }

        // Renderizar playlist inicial
        renderPlaylist();

        // Cargar el primer video por defecto
        loadVideo(0);
    </script>
    <script src="../js/countdown.js"></script>
</body>

</html>
