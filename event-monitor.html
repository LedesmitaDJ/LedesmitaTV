<style>

@font-face {
    font-family: 'LedesmitaTV Font';
    src: url('../font/Audiowide-Regular.ttf') format('truetype');
}

body{
font-family:Arial;
-background:#0b0f17;
color:white;
margin:0;
}

header{
font-family: 'LedesmitaTV Font', sans-serif;
font-weight: 500;
background:#0d47a1;
padding:15px;
font-size:22px;
text-align:center;
}

table{
width:100%;
border-collapse:collapse;
}

thead, tbody tr{
display:table;
width:100%;
table-layout:fixed;
}

tbody{
display:block;
max-height:320px;
overflow-y:auto;
scroll-behavior:smooth;
}

thead{
background:#111;
position:sticky;
top:0;
z-index:5;
}

#events{
display:block;
max-height:400px;   /* altura del área visible */
overflow-y:hidden;
scroll-behavior:smooth;
}

#events tr{
display:table;
width:100%;
table-layout:fixed;
}

th,td{
padding:10px;
border-bottom:1px solid #333;
text-align:left;
}

th{
background:#111;
}

th:nth-child(1),
td:nth-child(1){
width:90px;
}

th:nth-child(2),
td:nth-child(2){
width:30px;
text-align:center;
}

th:nth-child(3),
td:nth-child(3){
width:30px;
text-align:center;
}

th:nth-child(4),
td:nth-child(4){
width:40%;
}

th:nth-child(5),
td:nth-child(5){
width:18%;
}

th:nth-child(6),
td:nth-child(6){
width:30%;
}

th:nth-child(7),
td:nth-child(7){
width:10%;
}

/* contenedor */

.channels{
display:flex;
align-items:center;
flex-wrap:wrap;
gap:6px;
}

.channelItem{
display:flex;
align-items:center;
gap:6px;
font-weight:bold;
}

.logo{
width:20px;
height:100%;
display: inline-block;
}

.separator{
color:#888;
margin:0 4px;
font-weight:bold;
}

/* colores */

.caracol{color:#ADD8E6;}
.rcn{color:#bfff00;}
.espn{color:#DA020E;}
.dsports{color:#008000;}

.youtube{color:#ff0000;}
.facebook{color:#1877f2;}
.twitch{color:#9146FF;}
.web{color:#ffffff;}
.disney+{color:#ffffff;}
.ditu{color:#800080;}

.disponible{color:red;}

.liveText{
color:red;
font-weight:bold;
}

.upcoming{
color:#ffaa00;
}

/* animación live */

.liveIndicator{
display:inline-block;
width:10px;
height:10px;
background:red;
border-radius:50%;
margin-left:2px;
animation:pulse 1s infinite;
}

@keyframes pulse{
0%{transform:scale(0.8);opacity:0.7;}
50%{transform:scale(1.4);opacity:1;}
100%{transform:scale(0.8);opacity:0.7;}
}

</style>
</head>

<body>

    <img src="img/logo2-ledesmita-tv.png" style="display: block; margin: auto;" width="360" height="100%">

function buildList(items,logos){

let html='<div class="channels">';

items.forEach((item,index)=>{

html+=`

<div class="channelItem ${item.toLowerCase()}">
<img class="logo" src="${logos[item]}" onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/1/14/No_Image_Available.jpg'">
${item}
</div>

`;

if(index < items.length-1){
html+='<span class="separator">|</span>';
}

});

html+='</div>';

return html;

}

function updateEvents(){

const now=new Date();
const table=document.getElementById("events");

let visibleEvents=[];

events.forEach(e=>{

const start=new Date(e.date+"T"+e.start+":00");
const end=new Date(e.date+"T"+e.end+":00");

let status="";

if(now<start){
status="UPCOMING";
}
else if(now>=start && now<=end){
status="LIVE";
}
else{
return;
}

visibleEvents.push({...e,startDate:start,status});

});

visibleEvents.sort((a,b)=>{

if(a.status==="LIVE" && b.status!=="LIVE") return -1;
if(a.status!=="LIVE" && b.status==="LIVE") return 1;

return a.startDate-b.startDate;

});

table.innerHTML="";

visibleEvents.forEach(e=>{

let statusHTML="";

if(e.status==="LIVE"){
statusHTML=`<span class="liveIndicator"></span>&nbsp;&nbsp;<span class="liveText">En vivo</span>`;
}else{
statusHTML=`<span class="upcoming">Próximamente</span>`;
}

let row=document.createElement("tr");

row.innerHTML=`

<td>${e.date}</td>
<td>${e.start}</td>
<td>${e.end}</td>
<td>${e.title}</td>
<td>${buildList(e.channels,channelLogos)}</td>
<td>${buildList(e.streams,streamLogos)}</td>
<td>${statusHTML}</td>

`;

table.appendChild(row);

});

}

document.addEventListener("DOMContentLoaded", () => {

updateEvents(); // primera ejecución

setInterval(function(){

location.reload();

},60000);

});

function startAutoScroll(){

const tbody = document.getElementById("events");

let scrollSpeed = 1;     // velocidad
let scrollDelay = 40;    // suavidad

let scrollInterval = setInterval(()=>{

if(tbody.scrollHeight <= tbody.clientHeight){
return; // no hay scroll
}

if(tbody.scrollTop + tbody.clientHeight >= tbody.scrollHeight){

clearInterval(scrollInterval); // detener al llegar al final
return;

}

tbody.scrollTop += scrollSpeed;

},scrollDelay);

}

/* iniciar 10 segundos después */

window.addEventListener("load",()=>{

setTimeout(startAutoScroll,10000);

});
